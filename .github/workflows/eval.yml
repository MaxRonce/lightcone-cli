name: Eval

on:
  pull_request:
  workflow_dispatch:

# Only one eval per PR at a time — cancel in-progress runs
concurrency:
  group: eval-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git credentials for private ASTRA repo
        run: git config --local url."https://x-access-token:${{ secrets.ASP_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true
          activate-environment: true

      - name: Install dependencies
        run: uv sync --group eval

      - name: Run eval
        id: eval
        env:
          DAYTONA_API_KEY: ${{ secrets.DAYTONA_API_KEY }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        shell: bash
        run: |
          set -o pipefail
          lc eval run evals/build.yaml --num-trials 1 --concurrency 1 2>&1 | tee eval-output.txt

          # Find the results JSON and extract key metrics
          results_json=$(find eval-results -name results.json -type f | head -1)
          python3 .github/scripts/parse_eval_results.py "$results_json"

      - name: Upload results artifact
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval-results/

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const score = '${{ steps.eval.outputs.score }}' || 'N/A';
            const cost = '${{ steps.eval.outputs.cost }}' || 'N/A';
            const turns = '${{ steps.eval.outputs.turns }}' || 'N/A';
            const duration = '${{ steps.eval.outputs.duration }}' || 'N/A';
            const buildComplete = '${{ steps.eval.outputs.build_complete }}';
            const lightconeVersion = '${{ steps.eval.outputs.lightcone_version }}' || 'unknown';
            const lightconeCommit = '${{ steps.eval.outputs.lightcone_commit }}' || 'unknown';
            const outcome = '${{ steps.eval.outcome }}';
            const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
            const artifactId = '${{ steps.upload.outputs.artifact-id }}';
            const artifactUrl = artifactId ? `${runUrl}/artifacts/${artifactId}` : '';

            let graders = '';
            try { graders = fs.readFileSync('grader-details.txt', 'utf8'); } catch {}

            const icon = outcome === 'success' ? '✅' : '❌';
            const body = [
              `## ${icon} Eval Results`,
              '',
              `| Metric | Value |`,
              `|--------|-------|`,
              `| Score | **${score}** |`,
              `| Build complete | ${buildComplete === 'True' ? '✅' : '❌'} |`,
              `| Cost | $${cost} |`,
              `| Turns | ${turns} |`,
              `| Duration | ${duration}s |`,
              `| lightcone-cli | \`${lightconeVersion}\` (\`${lightconeCommit}\`) |`,
              artifactUrl ? `| Results | [Download](${artifactUrl}) |` : '',
              '',
              '### Graders',
              graders || '_No grader results_',
              '',
              `<details><summary>Full output</summary>`,
              '',
              '```',
              fs.readFileSync('eval-output.txt', 'utf8').slice(-3000),
              '```',
              '</details>',
            ].join('\n');

            // Find and update existing comment, or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const marker = '## ✅ Eval Results';
            const marker2 = '## ❌ Eval Results';
            const existing = comments.find(c =>
              c.body.startsWith(marker) || c.body.startsWith(marker2)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
